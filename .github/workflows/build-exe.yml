name: Build Windows EXE (portabile)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # avvio manuale dal sito GitHub

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npx vite build

      - name: Build portable EXE
        run: npx electron-builder --win portable

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AMOS-Windows-portable
          path: release/*.exe
